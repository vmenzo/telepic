services:
  telepic:
    build: .
    ports:
      - "${PORT:-8787}:${PORT:-8787}"
    env_file:
      - .env
    environment:
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-8787}
      PUBLIC_URL: ${PUBLIC_URL:-http://127.0.0.1:8787}
      DATA_DIR: ${DATA_DIR:-/app/data}
      DATABASE_DRIVER: ${DATABASE_DRIVER:-sqlite}
      DATABASE_FILE: ${DATABASE_FILE:-/app/data/telepic.sqlite}
      THUMB_DIR: ${THUMB_DIR:-/app/data/thumbs}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-auto}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
      S3_PREFIX: ${S3_PREFIX:-telepic}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-change-me-to-a-long-random-secret}
      ADMIN_TOKEN_HASH: ${ADMIN_TOKEN_HASH:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-admin-password}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-}
      ADMIN_SESSION_HOURS: ${ADMIN_SESSION_HOURS:-168}
      ADMIN_SESSION_IDLE_MINUTES: ${ADMIN_SESSION_IDLE_MINUTES:-30}
      PUBLIC_UPLOAD: ${PUBLIC_UPLOAD:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-change-me-webhook-secret}
      TELEGRAM_ALLOWED_USER_IDS: ${TELEGRAM_ALLOWED_USER_IDS:-}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-10485760}
      REMOTE_FETCH_TIMEOUT_MS: ${REMOTE_FETCH_TIMEOUT_MS:-12000}
      THUMB_SIZE: ${THUMB_SIZE:-512}
      THUMB_QUALITY: ${THUMB_QUALITY:-78}
      ALLOW_SVG_UPLOADS: ${ALLOW_SVG_UPLOADS:-false}
    volumes:
      - ./.env:/app/.env
      - telepic-data:/app/data

volumes:
  telepic-data:
